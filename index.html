<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>กูฟีมพาแนลโปร</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#111;
  color:#fff;
}

.panel{
  margin:40px 15px;
  padding:20px;
  background:#000;
  border-radius:20px;
  box-shadow:0 0 20px rgba(255,0,0,0.4);
}

.title{
  text-align:center;
  color:red;
  font-weight:bold;
  font-size:20px;
}

.card-box{
  display:flex;
  gap:10px;
  margin:20px 0;
}

.card{
  flex:1;
  background:#111;
  border:2px solid red;
  border-radius:15px;
  padding:10px;
  text-align:center;
  box-shadow:0 0 10px red;
}

.card img{
  width:100%;
  height:90px;
  object-fit:cover;
  border-radius:10px;
  margin-bottom:5px;
}

.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:15px 0;
}

.toggle{
  width:50px;
  height:25px;
  background:#333;
  border-radius:20px;
  position:relative;
  cursor:pointer;
}

.toggle::after{
  content:"";
  width:20px;
  height:20px;
  background:#fff;
  border-radius:50%;
  position:absolute;
  top:2.5px;
  left:3px;
  transition:0.3s;
}

.toggle.active{
  background:red;
}

.toggle.active::after{
  left:26px;
}

.bottom-menu{
  position:fixed;
  bottom:0;
  width:100%;
  background:#000;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  border-top:1px solid #333;
}

.bottom-menu div{
  text-align:center;
  font-size:12px;
}
</style>
</head>

<body>

<div class="panel">
  <div class="title">กูฟีมพาแนลโปร</div>

  <div class="card-box">
    <div class="card">
      <img src="https://picsum.photos/300/150?random=1">
      <div>ITEM 1</div>
    </div>

    <div class="card">
      <img src="https://picsum.photos/300/150?random=2">
      <div>ITEM 2</div>
    </div>
  </div>

  <div class="item">
    <span>Feature 1</span>
    <div class="toggle" onclick="toggle(this)"></div>
  </div>

  <div class="item">
    <span>Feature 2</span>
    <div class="toggle" onclick="toggle(this)"></div>
  </div>

</div>

<div class="bottom-menu">
  <div>🏠<br>Home</div>
  <div>⚙️<br>Setting</div>
  <div>👤<br>Profile</div>
</div>

<script>
function toggle(el){
  el.classList.toggle("active");
}
</script>

</body>
</html>
